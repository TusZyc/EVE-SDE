name: Build and Deploy EVE SDE Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl

      - name: Build static site from official SDE
        env:
          SDE_VARIANT: jsonl
          PYTHONUTF8: "1"
          CEVE_MARKET_XLSX_URL: https://www.ceve-market.org/dumps/evedata.xlsx
        run: |
          python scripts/build_sde_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
